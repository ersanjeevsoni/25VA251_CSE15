<body>
    <script>
        //Function:- block of codes , designed to perform specific task
        //types of function - with parameter, without parameter and with default parameter
        
        //normal function without para
        function demo(){
             console.log("Hello JS");
        }
        demo(); // function calling
        //function with parameter
        function demo1(text){
            console.log("Hello " + text);
        }
        demo1("React");
        //function with defualt para

        function add(a,b=10){
             var num1=a;
             var num2=b;
             var res=num1+num2;
             console.log("Addition of two number is " + res);
        }
        add(34);
        //synchronous and asynchronous
        //Synchronous (sync) operations run sequentially, blocking further execution until a task completes, providing immediate consistency. Asynchronous (async) operations run concurrently or non-blockingly, allowing other tasks to proceed while waiting for a response, boosting efficiency and scalability in I/O-heavy applications

        // Anonyomous Function: a function that does not have an identifier (name) associated with it.

        let msg= function(){
             console.log("Hello ABES");
        }
        msg();
        //short code for above function i.e. arrow function

        let msg1=()=>console.log("Hello React");
        msg1();
        //arrow function with multiple lines
        let msg2=(age)=>{
          if(age>=18){
            console.log("valid age");
          }
        }
        msg2(23);

        //call back function
        //A callback function is a function passed as an argument into another function. A callback function is intended to be executed later.


        function cal(a,b,callback){
        var num1=a;
        console.log("First number is " + num1);
        var num2=b;
        console.log("Second number is " + num2);
        var res=num1+num2;
      callback(res);
        }
        function display(res){
            console.log("Result is " + res);
        }
        cal(3,4,display);

        // callback using setTimeout API

        function greeting(){
            document.writeln("Hello Student");
        }
        function loading(){
            document.writeln("Data loading.....");
        }
         loading();
        setTimeout(greeting, 2000);
        //call back hell.......

        //JavaScript Promises: JavaScript Promises were created to make asynchronous JavaScript easier to use.
        //Promises Stages..........
// pending-	operation started (not finished)
// rejected-	operation failed
// fulfilled-	operation completed
let promise=new Promise(function(resolve,reject){
    let myAge =23;
    if(myAge>=18){
        resolve("valid age");
    }
    else{
        reject("wait for next year");
    }
});
promise.then(result=>console.log(result)).catch(error=>console.log(error));

//async and await are modern JavaScript keywords that provide a cleaner, more readable way to work with asynchronous code and promises, making asynchronous code look and feel more like traditional synchronous code.
//fetch api

async function userData(){
 let userResponse=await fetch('https://dummyjson.com/products?limit=10&skip=10&select=title,price');
 let userDataRes=await userResponse.json();
 console.log(userDataRes);
}
userData();
       //async await using try catch

       async function productDetail() {
        try{
            let proRes=await fetch('https://fakestoreapi.com/products');
        let proResData=await proRes.json();
        console.log(proResData);
        }
        catch(error){
             console.log("not valid data " + error);
        }
       }
       productDetail();
    </script>
